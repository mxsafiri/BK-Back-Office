services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: fimco
      POSTGRES_PASSWORD: fimco
      POSTGRES_DB: fimco
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
